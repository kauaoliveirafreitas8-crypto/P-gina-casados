    <script>
      // Monkey patch JSON.stringify to gracefully handle circular structures (like HTML elements and React fibers)
      (function() {
        var originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          try {
            return originalStringify(value, replacer, space);
          } catch (e) {
            if (e && (e.message || "").toLowerCase().includes("circular")) {
              var cache = new Set();
              var result = originalStringify(value, function(key, val) {
                if (typeof val === "object" && val !== null) {
                  if (cache.has(val)) {
                    return "[Circular]";
                  }
                  cache.add(val);
                }
                return replacer ? replacer(key, val) : val;
              }, space);
              cache.clear();
              return result;
            }
            throw e;
          }
        };
      })();
    </script>
